experiment_name: linear_iq_shift_detection_v1

input:
  directory: results/iq_channel_features_v1
  artifact_filename: iq_channel_features.npz
  clean_condition: clean

  shifted_conditions:
    - mild
    - moderate
    - severe

split:
  development_fraction: 0.50
  split_seed: 2026
  snr_decimals: 6

detector:
  fold_count: 5
  cv_seed: 2026

  l2_strengths:
    - 0.000001
    - 0.00001
    - 0.0001
    - 0.001
    - 0.01
    - 0.1
    - 1.0
    - 10.0
    - 100.0

analysis:
  target_tpr: 0.95

output:
  directory: results/linear_iq_shift_detection_v1
  summary_filename: aggregate_metrics.json
