experiment_name: multipath_mitigation_comparison_v1

condition_order:
  - clean
  - mild
  - moderate
  - severe

seeds:
  - 2026
  - 2027
  - 2028
  - 2029
  - 2030

class_names:
  - BPSK
  - QPSK
  - 8PSK
  - 16QAM

target_class: 16QAM

models:
  original:
    display_name: Original clean-trained model
    conditions:
      clean:
        aggregate_metrics: results/baseline_cnn_groupnorm_head_refit_seed_sweep_v1_test/aggregate_metrics.json
        predictions_directory: results/baseline_cnn_groupnorm_head_refit_seed_sweep_v1_test/predictions
      mild:
        aggregate_metrics: results/baseline_cnn_groupnorm_head_refit_multipath_mild_seed_sweep_v1_test/aggregate_metrics.json
        predictions_directory: results/baseline_cnn_groupnorm_head_refit_multipath_mild_seed_sweep_v1_test/predictions
      moderate:
        aggregate_metrics: results/baseline_cnn_groupnorm_head_refit_multipath_moderate_seed_sweep_v1_test/aggregate_metrics.json
        predictions_directory: results/baseline_cnn_groupnorm_head_refit_multipath_moderate_seed_sweep_v1_test/predictions
      severe:
        aggregate_metrics: results/baseline_cnn_groupnorm_head_refit_multipath_severe_seed_sweep_v1_test/aggregate_metrics.json
        predictions_directory: results/baseline_cnn_groupnorm_head_refit_multipath_severe_seed_sweep_v1_test/predictions

  mitigated:
    display_name: Mixed-multipath-trained model
    conditions:
      clean:
        aggregate_metrics: results/baseline_cnn_groupnorm_multipath_mixed_seed_sweep_v1_test/aggregate_metrics.json
        predictions_directory: results/baseline_cnn_groupnorm_multipath_mixed_seed_sweep_v1_test/predictions
      mild:
        aggregate_metrics: results/baseline_cnn_groupnorm_multipath_mixed_mild_seed_sweep_v1_test/aggregate_metrics.json
