experiment_name: baseline_cnn_groupnorm_head_refit_v1

source_checkpoint_path: results/baseline_cnn_groupnorm_v1/best_model.pt

dataset:
  train_path: data/processed/rf_modulation_baseline_v1/train.npz
  validation_path: data/processed/rf_modulation_baseline_v1/validation.npz

refit:
  regularization_candidates:
    - 0.01
    - 0.03
    - 0.1
    - 0.3
    - 1.0
    - 3.0
    - 10.0
  max_iter: 5000
  random_state: 2026

evaluation:
  batch_size: 256
  num_workers: 0
  pin_memory: true

output:
  directory: results/baseline_cnn_groupnorm_head_refit_v1
  checkpoint_name: best_model.pt
  summary_name: summary.json
